name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and evaluate
    runs-on: ubuntu-latest
    outputs:
      minors: ${{ steps.matrix.outputs.minors }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Validate catalogue and append-only history
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            python3 scripts/validate-versions.py --base-ref "$BASE_SHA"
          else
            python3 scripts/validate-versions.py
          fi
      - name: Test Python automation
        run: python3 -m unittest discover -s tests -v
      - name: Validate Renovate configuration
        run: >-
          nix shell --no-write-lock-file --inputs-from . nixpkgs#renovate
          --command renovate-config-validator
      - name: Check flake
        run: nix flake check --print-build-logs
      - name: Evaluate every supported system
        run: |
          nix eval .#packages.x86_64-linux --apply builtins.attrNames --json
          nix eval .#packages.aarch64-linux --apply builtins.attrNames --json
      - name: Select build matrix
        id: matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            minors=$(python3 scripts/changed-minors.py --base "$BASE_SHA")
          else
            minors=$(python3 scripts/changed-minors.py --all)
          fi
          echo "minors=$minors" >> "$GITHUB_OUTPUT"

  build:
    name: Build Kubernetes ${{ matrix.minor }}
    needs: validate
    if: needs.validate.outputs.minors != '[]'
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
    strategy:
      fail-fast: false
      matrix:
        minor: ${{ fromJSON(needs.validate.outputs.minors) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Configure optional Cachix cache
        if: env.CACHIX_CACHE_NAME != ''
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE_NAME }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ env.CACHIX_AUTH_TOKEN == '' }}
      - name: Build Kubernetes components
        env:
          MINOR: ${{ matrix.minor }}
        run: |
          attribute="kubernetes_${MINOR//./_}"
          components=(
            cloud-controller-manager
            kube-apiserver
            kube-controller-manager
            kube-proxy
            kube-scheduler
            kubeadm
            kubectl
            kubelet
          )
          installables=()
          for component in "${components[@]}"; do
            installables+=(".#$attribute.$component")
          done
          nix build "${installables[@]}" --no-link --print-build-logs
      - name: Verify component versions
        env:
          MINOR: ${{ matrix.minor }}
        run: |
          attribute="kubernetes_${MINOR//./_}"
          expected="v$(jq -r .version "versions/$MINOR.json")"

          kubeadm_path=$(nix build ".#$attribute.kubeadm" --no-link --print-out-paths)
          kubectl_path=$(nix build ".#$attribute.kubectl" --no-link --print-out-paths)

          kubeadm_version=$("$kubeadm_path/bin/kubeadm" version -o short)
          kubectl_version=$(
            "$kubectl_path/bin/kubectl" version --client=true --output=json |
              jq -r .clientVersion.gitVersion
          )

          if [[ "$kubeadm_version" != "$expected" ]]; then
            echo "kubeadm reported $kubeadm_version, expected $expected" >&2
            exit 1
          fi
          if [[ "$kubectl_version" != "$expected" ]]; then
            echo "kubectl reported $kubectl_version, expected $expected" >&2
            exit 1
          fi

          components=(
            cloud-controller-manager
            kube-apiserver
            kube-controller-manager
            kube-proxy
            kube-scheduler
            kubelet
          )
          for component in "${components[@]}"; do
            path=$(nix build ".#$attribute.$component" --no-link --print-out-paths)
            actual=$("$path/bin/$component" --version)
            if [[ "$actual" != "Kubernetes $expected" ]]; then
              echo "$component reported $actual, expected Kubernetes $expected" >&2
              exit 1
            fi
          done

  gate:
    name: CI passed
    if: always()
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs passed
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
        run: |
          if [[ "$VALIDATE_RESULT" != "success" ]]; then
            echo "Validation result: $VALIDATE_RESULT" >&2
            exit 1
          fi
          if [[ "$BUILD_RESULT" != "success" && "$BUILD_RESULT" != "skipped" ]]; then
            echo "Build result: $BUILD_RESULT" >&2
            exit 1
          fi
