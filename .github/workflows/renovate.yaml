name: Renovate

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Ensure automation labels exist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh label create automerge --color 0e8a16 --description "Merge after CI passes" --force
          gh label create kubernetes-patch --color 1d76db --description "Automated Kubernetes patch update" --force
          gh label create dependencies --color 0366d6 --description "Dependency update" --force
          gh label create nixpkgs --color 7e7eff --description "nixpkgs input update" --force
      - name: Run Renovate
        env:
          LOG_LEVEL: info
          RENOVATE_ALLOWED_COMMANDS: '["^python3 scripts/update-hashes\\.py --changed$"]'
          RENOVATE_BINARY_SOURCE: global
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_REQUIRE_CONFIG: required
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: nix run --no-write-lock-file --inputs-from . nixpkgs#renovate
